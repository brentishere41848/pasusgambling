services:
  - type: web
    name: pasusgambling-api
    env: node
    region: oregon
    buildCommand: npm install && npm run build:server
    startCommand: npm run start:server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_BASE_URL
        value: https://pasusgambling.wasmer.app
      - key: API_BASE_URL
        value: https://pasusgambling.onrender.com
      - key: SESSION_SECRET
        sync: false
