services:
  - type: web
    name: pasusgambling-api
    rootDir: .
    env: node
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: node --import tsx server/index.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_BASE_URL
        value: https://pasusgambling.wasmer.app
      - key: API_BASE_URL
        value: https://pasusgambling.onrender.com
      - key: SESSION_SECRET
        sync: false
