    <!-- Featurebase SDK - Load First -->
    <script>
      (function(e,t){
        var a="featurebase-sdk";
        // Create queue if not exists
        if(typeof e.Featurebase==="undefined"){
          e.Featurebase=function(){
            if(e.Featurebase.q){
              e.Featurebase.q.push(arguments);
            }
          };
          e.Featurebase.q=[];
        }
        // Function to load SDK
        function n(){
          // Check if already loaded
          if(t.getElementById(a)) return;
          var s=t.createElement("script");
          s.id=a;
          s.src="https://do.featurebase.app/js/sdk.js?v="+Date.now();
          s.onload=function(){
            window.featureBaseLoaded=true;
            // Process queued commands
            if(e.Featurebase.q){
              e.Featurebase.q.forEach(function(args){
                if(typeof e.Featurebase==='function'){
                  e.Featurebase.apply(null,args);
                }
              });
              e.Featurebase.q=[];
            }
          };
          t.head.appendChild(s);
        }
        // Load if not complete
        if(t.readyState==="complete"||t.readyState==="interactive"){
          n();
        }else{
          t.addEventListener("DOMContentLoaded",n);
        }
      })(window,document);
    </script>

    <!-- Featurebase Boot Script -->
    <script>
      window.bootFeaturebase = function(userData) {
        var config = {
          appId: "69c1b44485cadc7c01d5c697",
          theme: "dark",
          language: "en"
        };
        if (userData && userData.email) {
          config.email = userData.email;
          config.userId = String(userData.id);
          config.createdAt = userData.createdAt || new Date().toISOString();
        }
        Featurebase("boot", config);
        window.featurebaseBooted = true;
      };
      
      window.openFeaturebaseChat = function() {
        if (window.featureBaseLoaded) {
          try {
            Featurebase("open_chat");
          } catch(e) {
            console.error("Featurebase open_chat error:", e);
          }
        } else {
          // Try again after a short delay
          setTimeout(function() {
            try {
              Featurebase("open_chat");
            } catch(e) {
              console.error("Featurebase open_chat error:", e);
            }
          }, 1000);
        }
      };
      
      // Boot on page load
      window.bootFeaturebase(null);
    </script>
